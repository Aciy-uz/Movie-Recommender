<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能电影推荐系统</title>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
/* 基础样式重置 */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    line-height: 1.6;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
}

/* 头部导航样式 */
.site-header {
    background: #1a1a2e;
    border-bottom: 2px solid #ff4757;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.header-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 0;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: #fff;
    font-size: 28px;
    font-weight: bold;
}

.logo i {
    color: #ff4757;
}

.nav-links {
    display: flex;
    list-style: none;
    gap: 40px;
}

.nav-item {
    color: #e0e0e0;
    text-decoration: none;
    padding: 10px 0;
    border-bottom: 3px solid transparent;
    transition: all 0.3s ease;
    font-size: 16px;
    font-weight: 500;
}

.nav-item:hover,
.nav-item.active {
    color: #ff4757;
    border-bottom-color: #ff4757;
}

.search-box {
    position: relative;
    width: 300px;
}

.search-input {
    width: 100%;
    padding: 12px 45px 12px 20px;
    background: #2d2d44;
    border: 1px solid #444;
    border-radius: 8px;
    color: white;
    outline: none;
    font-size: 14px;
}

.search-input::placeholder {
    color: #888;
}

.search-icon {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: #888;
    cursor: pointer;
}

.mobile-menu-btn {
    display: none;
    background: none;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
}

/* 主内容区域 */
.header {
    text-align: center;
    padding: 50px 0 40px;
    border-bottom: 1px solid #333;
    margin-bottom: 40px;
}

.header h1 {
    font-size: 3rem;
    margin-bottom: 15px;
    color: #fff;
    text-shadow: 0 2px 10px rgba(255, 71, 87, 0.3);
}

.header p {
    color: #aaa;
    font-size: 1.2rem;
}

/* 搜索区域 */
.search-section {
    background: #1a1a2e;
    border-radius: 12px;
    padding: 40px;
    margin-bottom: 50px;
    border: 1px solid #333;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
}

.search-box {
    width: 100%;
    max-width: 700px;
    margin: 0 auto 30px;
}

.search-input {
    width: 100%;
    padding: 18px 25px;
    font-size: 16px;
    background: #2d2d44;
    border: 2px solid #444;
    border-radius: 10px;
    color: white;
    outline: none;
    transition: all 0.3s ease;
}

.search-input:focus {
    border-color: #ff4757;
    box-shadow: 0 0 0 3px rgba(255, 71, 87, 0.1);
}

.search-btn {
    background: linear-gradient(135deg, #ff4757, #ff6b81);
    color: white;
    border: none;
    padding: 16px 45px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    display: block;
    margin: 25px auto 0;
    min-width: 220px;
    box-shadow: 0 4px 15px rgba(255, 71, 87, 0.2);
}

.search-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 71, 87, 0.3);
}

.search-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

.demo-examples {
    text-align: center;
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid #333;
}

.demo-examples span {
    color: #aaa;
    margin-right: 15px;
    font-size: 14px;
}

.demo-btn {
    background: #2d2d44;
    color: #e0e0e0;
    border: 1px solid #444;
    padding: 8px 18px;
    border-radius: 20px;
    margin: 0 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 14px;
}

.demo-btn:hover {
    background: #ff4757;
    color: white;
    border-color: #ff4757;
}

.error-message {
    background: rgba(255, 71, 87, 0.1);
    border: 1px solid rgba(255, 71, 87, 0.3);
    color: #ff6b6b;
    padding: 15px;
    border-radius: 8px;
    margin-top: 20px;
    display: none;
}

/* 加载动画 */
.loading {
    text-align: center;
    padding: 60px;
    display: none;
}

.spinner {
    width: 60px;
    height: 60px;
    border: 4px solid rgba(255, 71, 87, 0.1);
    border-top: 4px solid #ff4757;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 25px;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.loading p {
    color: #aaa;
    font-size: 16px;
}

/* 结果区域 */
.results-section {
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
    padding-bottom: 20px;
    border-bottom: 2px solid #333;
}

.results-title {
    font-size: 2.2rem;
    color: #fff;
    font-weight: bold;
}

.results-stats {
    color: #888;
    font-size: 14px;
    background: #2d2d44;
    padding: 8px 16px;
    border-radius: 20px;
}

/* 电影网格 */
.movie-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 30px;
    margin-bottom: 60px;
}

.movie-card {
    background: #1a1a2e;
    border-radius: 15px;
    padding: 30px;
    border: 1px solid #333;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
}

.movie-card:hover {
    transform: translateY(-8px);
    border-color: #ff4757;
    box-shadow: 0 15px 40px rgba(255, 71, 87, 0.15);
}

.movie-rank {
    position: absolute;
    top: 20px;
    right: 20px;
    background: linear-gradient(135deg, #ff4757, #ff6b81);
    color: white;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 20px;
    box-shadow: 0 4px 10px rgba(255, 71, 87, 0.3);
}

.movie-title {
    font-size: 1.6rem;
    font-weight: bold;
    margin-bottom: 5px;
    color: #fff;
    line-height: 1.3;
}

.movie-original-title {
    color: #aaa;
    font-size: 0.95rem;
    margin-bottom: 20px;
    font-style: italic;
}

.movie-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
    font-size: 0.9rem;
    color: #bbb;
}

.movie-year,
.movie-rating,
.movie-match,
.movie-duration {
    background: #2d2d44;
    padding: 6px 14px;
    border-radius: 15px;
    font-weight: 500;
}

.movie-rating {
    color: #ffd700;
    font-weight: bold;
}

.movie-match {
    color: #00ff88;
}

.movie-info-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-bottom: 20px;
    font-size: 0.95rem;
}

.info-label {
    color: #888;
    margin-right: 8px;
    font-weight: 500;
}

.info-value {
    color: #e0e0e0;
    font-weight: 400;
}

.movie-genres {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
}

.genre-tag {
    background: rgba(255, 71, 87, 0.15);
    color: #ff6b81;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 500;
    border: 1px solid rgba(255, 71, 87, 0.3);
}

.movie-summary {
    background: #2d2d44;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 0.95rem;
    line-height: 1.7;
    color: #ccc;
}

.movie-summary strong {
    color: #ff6b81;
    margin-right: 8px;
}

.movie-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 20px;
}

.tag {
    background: rgba(255, 255, 255, 0.08);
    color: #aaa;
    padding: 5px 12px;
    border-radius: 15px;
    font-size: 0.85rem;
    font-weight: 500;
}

/* 推荐理由样式 */
.reasons-section {
    margin-top: 25px;
    padding-top: 25px;
    border-top: 1px solid #333;
}

.reasons-title {
    color: #ff6b81;
    font-weight: bold;
    margin-bottom: 20px;
    font-size: 1.3rem;
    display: flex;
    align-items: center;
    gap: 10px;
}

.reasons-title::before {
    content: "🎯";
    font-size: 1.2rem;
}

.reason-category {
    background: #2d2d44;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 15px;
    border-left: 4px solid #ff4757;
}

.reason-category-title {
    color: #ff6b81;
    font-weight: bold;
    margin-bottom: 12px;
    font-size: 1.1rem;
}

.collapse-content {
    overflow: hidden;
    transition: max-height 0.4s ease;
    max-height: 1000px;
}

.collapse-content.collapsed {
    max-height: 0;
}

.reason-point {
    color: #ccc;
    margin-bottom: 10px;
    font-size: 0.95rem;
    line-height: 1.6;
    padding-left: 16px;
    position: relative;
}

.reason-point::before {
    content: "•";
    color: #ff4757;
    position: absolute;
    left: 0;
    font-size: 1.2rem;
}

.collapse-btn {
    background: rgba(255, 71, 87, 0.1);
    color: #ff6b81;
    border: 1px solid rgba(255, 71, 87, 0.3);
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 0.9rem;
    cursor: pointer;
    margin-top: 15px;
    transition: all 0.3s ease;
    font-weight: 500;
}

.collapse-btn:hover {
    background: rgba(255, 71, 87, 0.2);
}

/* API信息样式 */
.api-info {
    text-align: center;
    padding: 30px;
    color: #888;
    font-size: 0.95rem;
    border-top: 2px solid #333;
    margin-top: 50px;
    background: #1a1a2e;
    border-radius: 12px;
}

.api-info p {
    margin-bottom: 10px;
}

.api-info a {
    color: #ff6b81;
    text-decoration: none;
    margin: 0 10px;
    font-weight: 500;
    transition: all 0.3s ease;
}

.api-info a:hover {
    color: #ff4757;
    text-decoration: underline;
}

/* 响应式设计 */
@media (max-width: 768px) {
    .mobile-menu-btn {
        display: block;
    }
    
    .desktop-nav,
    .desktop-search {
        display: none;
    }
    
    .movie-grid {
        grid-template-columns: 1fr;
        gap: 20px;
    }
    
    .header h1 {
        font-size: 2.2rem;
    }
    
    .movie-info-grid {
        grid-template-columns: 1fr;
    }
    
    .results-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
    }
    
    .search-btn {
        width: 100%;
    }
    
    .demo-examples {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
    }
    
    .demo-examples span {
        width: 100%;
        margin-bottom: 10px;
    }
    
    .search-section {
        padding: 25px;
    }
}

/* 移动菜单样式 */
.mobile-menu {
    background: #1a1a2e;
    border-top: 2px solid #ff4757;
    padding: 25px 0;
    position: absolute;
    width: 100%;
    top: 100%;
    left: 0;
    z-index: 1001;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}

.mobile-menu.hidden {
    display: none;
}

.mobile-nav-item {
    display: block;
    color: #e0e0e0;
    text-decoration: none;
    padding: 15px 20px;
    border-bottom: 1px solid #333;
    font-size: 18px;
    transition: all 0.3s ease;
}

.mobile-nav-item:hover,
.mobile-nav-item.active {
    color: #ff4757;
    background: rgba(255, 71, 87, 0.1);
    padding-left: 30px;
}

.mobile-search-container {
    margin-top: 20px;
    padding: 0 20px;
}

/* 滚动条样式 */
::-webkit-scrollbar {
    width: 10px;
}

::-webkit-scrollbar-track {
    background: #1a1a2e;
}

::-webkit-scrollbar-thumb {
    background: #ff4757;
    border-radius: 5px;
}

::-webkit-scrollbar-thumb:hover {
    background: #ff6b81;
}
    </style>
</head>
<body>
    <header class="site-header">
    <div class="container header-content">
      <a href="#" class="logo">
        <i class="fa fa-film"></i>
        <span>芯影推荐</span>
      </a>
      <nav class="desktop-nav">
        <ul class="nav-links">
          <li><a href="../index.html" class="nav-item">首页</a></li>
          <li><a href="./popular-charts.html" class="nav-item">热门</a></li>
          <li><a href="./category-filter.html" class="nav-item active">推荐</a></li>
          <li><a href="./ranking-list.html" class="nav-item">排行榜</a></li>
        </ul>
      </nav>
    </div>
    <div class="mobile-menu hidden" id="mobileMenu">
      <div class="container">
        <a href="#" class="mobile-nav-item active">首页</a>
        <a href="#" class="mobile-nav-item">热门榜单</a>
        <a href="#" class="mobile-nav-item">分类筛选</a>
        <a href="#" class="mobile-nav-item">最新上映</a>
        <a href="#" class="mobile-nav-item">关于我们</a>
        <div class="mobile-search-container">
          <div class="search-box">
            <input type="text" placeholder="搜索电影..." class="search-input">
            <i class="fa fa-search search-icon"></i>
          </div>
        </div>
      </div>
    </div>
  </header>
    <div class="container">
        <div class="header">
            <h1><i class="fa fa-film" style="color: red;"></i>  芯影智能电影推荐系统</h1>
            <p>基于AI集成模型的个性化电影推荐</p>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input type="text" class="search-input" placeholder="请输入您的电影需求，例如：我想看科幻动作片..." id="searchInput">
                <button class="search-btn" onclick="getRecommendations()" id="searchBtn">
                    <span id="btnText">推荐电影</span>
                </button>
            </div>

            <div class="demo-examples">
                <span>试试这些例子：</span>
                <button class="demo-btn" onclick="setExample('科幻动作电影')">科幻动作</button>
                <button class="demo-btn" onclick="setExample('浪漫爱情喜剧')">爱情喜剧</button>
                <button class="demo-btn" onclick="setExample('悬疑惊悚片')">悬疑惊悚</button>
                <button class="demo-btn" onclick="setExample('高分经典电影')">高分经典</button>
            </div>

            <div class="error-message" id="errorMessage"></div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>AI正在为您推荐电影...</p>
        </div>

        <div class="results-section" id="resultsSection" style="display: none;">
            <div class="results-header">
                <h2 class="results-title" id="resultsTitle">推荐结果</h2>
                <div class="results-stats" id="resultsStats"></div>
            </div>
            <div class="movie-grid" id="movieGrid"></div>
        </div>

        <div class="api-info">
            <p>芯影电影推荐系统API v2.0.0 |
                <a href="http://localhost:5000/api/health" target="_blank">API状态</a> |
                <a href="http://localhost:5000/api/info" target="_blank">API文档</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/Aiapi.js"></script>
</body>
</html>
